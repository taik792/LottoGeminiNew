<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Elite Pro V4 - Geometric Mirror</title>
    <style>
        :root {
            --bg-dark: #0f0f0f;
            --card-bg: #1a1a1a;
            --gold: #ffcc00;
            --cyan: #00d4ff;
            --green: #28a745;
        }

        body { background-color: var(--bg-dark); color: #e0e0e0; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding-bottom: 50px; }
        h1 { color: #fff; text-shadow: 0 0 10px var(--gold); margin-top: 30px; letter-spacing: 2px; }
        .subtitle { color: var(--cyan); font-weight: bold; margin-bottom: 30px; text-transform: uppercase; font-size: 0.8em; letter-spacing: 1px; }

        #top-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin: 0 auto 40px; max-width: 1200px; padding: 0 20px; }
        .top-card { border: 2px solid var(--gold); border-radius: 12px; padding: 15px; background: rgba(255,204,0,0.05); min-width: 260px; box-shadow: 0 0 15px rgba(255,204,0,0.2); }
        
        .container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 25px; padding: 0 30px; max-width: 1300px; margin: auto; }
        
        .card { background: var(--card-bg); border: 1px solid #333; border-radius: 15px; padding: 20px; position: relative; transition: all 0.3s ease; }
        .card:hover { transform: translateY(-5px); border-color: var(--cyan); box-shadow: 0 5px 20px rgba(0,0,0,0.6); }
        .card.gold-border { border: 2px solid var(--gold); }

        .ruota-nome { font-size: 1.5em; font-weight: bold; color: var(--cyan); margin-bottom: 5px; }
        .partner-label { font-size: 0.75em; color: var(--gold); font-weight: bold; margin-bottom: 15px; display: block; }
        
        .ultima-estrazione { margin-bottom: 20px; border-top: 1px solid #333; padding-top: 15px; }
        .palla-grigia { display: inline-block; background: #333; color: #999; border-radius: 50%; width: 30px; height: 30px; line-height: 30px; margin: 2px; font-size: 0.85em; font-weight: bold; }
        
        .palla-ambo { display: inline-block; background: var(--green); color: white; border-radius: 50%; width: 60px; height: 60px; line-height: 60px; margin: 10px; font-size: 1.6em; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        
        .tecnica-info { color: #888; font-size: 0.75em; font-style: italic; margin-top: 15px; }
        .score-tag { position: absolute; top: 10px; right: 10px; padding: 3px 10px; border-radius: 5px; font-size: 0.75em; font-weight: bold; color: #000; background: var(--gold); }
        .info-footer { font-size: 0.75em; color: #666; margin-top: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

    <h1>💎 LOTTO ELITE PRO V4 💎</h1>
    <div class="subtitle">Geometric Mirror - Analisi Simmetrie Isotope</div>

    <div id="top-container"></div>
    <div class="container" id="container-ruote"></div>

    <script>
        async function caricaDatiV4() {
            try {
                const response = await fetch('risultati_v4.json?t=' + Date.now());
                const data = await response.json();
                const risultati = data.ruote ? data.ruote : data;
                
                const container = document.getElementById('container-ruote');
                const topDiv = document.getElementById('top-container');
                
                container.innerHTML = '';
                topDiv.innerHTML = '';

                // --- ORDINE CORRETTO DEL BOLLETTINO ---
                const ordineUfficiale = [
                    "Bari", "Cagliari", "Firenze", "Genova", "Milano", 
                    "Napoli", "Palermo", "Roma", "Torino", "Venezia"
                ];

                // 1. TOP 3 (Sempre visibili in alto per score)
                const top3Keys = Object.keys(risultati)
                    .sort((a, b) => risultati[b].score - risultati[a].score)
                    .slice(0, 3);
                
                top3Keys.forEach((ruota, i) => {
                    const info = risultati[ruota];
                    topDiv.innerHTML += `
                        <div class="top-card">
                            <div style="color:var(--gold); font-size:0.7em; font-weight:bold">TOP SELECTION #${i+1}</div>
                            <div style="font-size:1.4em; font-weight:bold; margin:5px 0">${ruota}</div>
                            <div style="font-size:1.8em; color:var(--green); font-weight:bold">${info.ambo[0]} - ${info.ambo[1]}</div>
                            <div style="font-size:0.7em; color:#888; margin-top:5px">PARTNER: ${info.partner}</div>
                        </div>
                    `;
                });

                // 2. CARD ORDINATE SECONDO IL BOLLETTINO (Bari -> Cagliari -> Firenze...)
                ordineUfficiale.forEach(ruota => {
                    if (risultati[ruota]) {
                        const info = risultati[ruota];
                        const card = document.createElement('div');
                        card.className = `card ${info.score >= 180 ? 'gold-border' : ''}`;
                        
                        const ultimaHtml = info.ultima.map(n => `<span class="palla-grigia">${n}</span>`).join('');
                        const partnerLabel = info.partner !== "Nessuno" ? `In specchio con: ${info.partner}` : "Analisi Standard";

                        card.innerHTML = `
                            <div class="score-tag">${info.score}</div>
                            <div class="ruota-nome">${ruota}</div>
                            <span class="partner-label">${partnerLabel}</span>
                            <div class="ultima-estrazione">${ultimaHtml}</div>
                            <div class="previsione">
                                <div class="palla-ambo">${info.ambo[0]}</div>
                                <div class="palla-ambo">${info.ambo[1]}</div>
                            </div>
                            <div class="tecnica-info">${info.tecnica}</div>
                            <div class="info-footer">ATTESA: ${info.countdown} ESTRAZIONI</div>
                        `;
                        container.appendChild(card);
                    }
                });

            } catch (error) {
                console.error("Errore:", error);
            }
        }
        window.onload = caricaDatiV4;
    </script>
</body>
</html>

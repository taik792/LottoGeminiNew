<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Elite Pro V5 - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-primary: #111c24;
            --bg-secondary: #1a2836;
            --bg-card: #152230;
            --accent-blue: #00bfff;
            --accent-orange: #ff5722;
            --text-main: #ffffff;
            --text-muted: #8a99ad;
            --pool-yellow: #ffb300;
            --pool-red: #e53935;
            --pool-gray: #757575;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .header-container {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
            max-width: 1200px;
        }

        .sub-header {
            color: var(--accent-orange);
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .main-title {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .main-title i {
            color: var(--accent-blue);
        }

        /* Navigazione Tabelloni */
        .tabs-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .tab-btn {
            background-color: var(--bg-secondary);
            color: var(--text-muted);
            border: none;
            padding: 10px 24px;
            font-size: 13px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background-color: var(--accent-orange);
            color: var(--text-main);
            box-shadow: 0 4px 10px rgba(255, 87, 34, 0.4);
        }

        /* Grid delle schede previsionali */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }

        .previsione-card {
            background-color: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .card-tag {
            position: absolute;
            top: 12px;
            right: 12px;
            background-color: var(--accent-orange);
            color: white;
            font-size: 10px;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .card-ruote {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 18px;
            margin-top: 15px;
            color: var(--text-main);
            line-height: 1.4;
            word-wrap: break-word;
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .ruota-badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 14px;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* Colori dinamici delle ruote nelle schede */
        .ruota-red { background-color: var(--pool-red); color: white; }
        .ruota-gray { background-color: #e0e0e0; color: black; }
        .ruota-yellow { background-color: var(--pool-yellow); color: black; }

        .numbers-row {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            justify-content: center;
        }

        .ball {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 700;
            border: 2px solid #4caf50;
            color: #4caf50;
            background-color: rgba(76, 175, 80, 0.05);
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }

        .budget-box {
            background-color: rgba(0, 191, 255, 0.1);
            border: 1px solid var(--accent-blue);
            border-radius: 6px;
            padding: 6px 12px;
            display: flex;
            flex-direction: column;
        }

        .budget-label {
            font-size: 9px;
            color: var(--accent-blue);
            text-transform: uppercase;
            font-weight: 700;
        }

        .budget-val {
            font-size: 13px;
            font-weight: 700;
        }

        .accuracy-box {
            text-align: right;
        }

        .accuracy-label {
            font-size: 10px;
            color: var(--text-muted);
        }

        .accuracy-val {
            font-size: 14px;
            font-weight: 800;
            color: #ff5722;
        }

        .error-message {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: var(--text-muted);
            font-size: 16px;
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .main-title { font-size: 24px; }
            .card-ruote { font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="sub-header">Geometric Mirror • Analisi Simmetrie Isotope</div>
        <div class="main-title">
            <i class="fa-solid fa-gem"></i> LOTTO ELITE PRO V5 <i class="fa-solid fa-gem"></i>
        </div>
    </div>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab(event, 'nuove')">Nuove</button>
        <button class="tab-btn" onclick="switchTab(event, 'colpo2')">Colpo 2</button>
    </div>

    <div class="cards-grid" id="cardsGrid"></div>

    <script>
        let globaleDati = null;
        let tabAttivo = 'nuove';

        async function caricaDati() {
            const cardsGrid = document.getElementById('cardsGrid');
            try {
                // Allineato al nome file generato dal backend Python
                const risposta = await fetch('risultati_v4.json?v=' + Date.now());
                if (!risposta.ok) {
                    throw new Error("Impossibile leggere il file dei risultati.");
                }
                globaleDati = await risposta.json();
                renderTabellone(tabAttivo);
            } catch (err) {
                console.error(err);
                cardsGrid.innerHTML = `<div class="error-message"><i class="fa-solid fa-circle-exclamation"></i> Errore nel caricamento dei dati previsionali.</div>`;
            }
        }

        function renderTabellone(tabKey) {
            const cardsGrid = document.getElementById('cardsGrid');
            cardsGrid.innerHTML = '';

            if (!globaleDati || !globaleDati[tabKey]) {
                cardsGrid.innerHTML = `<div class="error-message">Nessuna previsione disponibile per questa sezione.</div>`;
                return Hull;
            }

            const elencoPrevisioni = globaleDati[tabKey];

            if (elencoPrevisioni.length === 0) {
                cardsGrid.innerHTML = `<div class="error-message">Nessuna previsione disponibile per il tabellone corrente.</div>`;
                return;
            }

            elencoPrevisioni.forEach(info => {
                const card = document.createElement('div');
                card.className = 'previsione-card';

                // Costruisce la riga dei numeri estratti o calcolati
                let pallineHtml = '';
                if (info.numero1) pallineHtml += `<div class="ball">${info.numero1}</div>`;
                if (info.numero2) pallineHtml += `<div class="ball">${info.numero2}</div>`;

                card.innerHTML = `
                    <div class="card-tag">${tabKey === 'nuove' ? 'Nuova' : 'COLPO 2'}</div>
                    <div class="card-ruote">
                        <span class="ruota-badge ruota-${info.colore_r1}">${info.ruota1}</span>
                        <span>•</span>
                        <span class="ruota-badge ruota-${info.colore_r2}">${info.ruota2}</span>
                    </div>
                    <div class="numbers-row">${pallineHtml}</div>
                    <div class="info-row">
                        <div class="budget-box">
                            <span class="budget-label">Budget Consigliato:</span>
                            <span class="budget-val">4.00€</span>
                        </div>
                        <div class="accuracy-box">
                            <div class="accuracy-label">Accuratezza:</div>
                            <div class="accuracy-val">${info.accuratezza || '100%'}</div>
                        </div>
                    </div>
                `;
                cardsGrid.appendChild(card);
            });
        }

        function switchTab(event, tabKey) {
            tabAttivo = tabKey;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            renderTabellone(tabKey);
        }

        window.onload = caricaDati;
    </script>
</body>
</html>

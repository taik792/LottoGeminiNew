<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Elite Pro - Geometric Mirror V4</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #ff9800;
            --secondary-text: #b0b0b0;
            --shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
            max-width: 800px;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 5px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .subtitle {
            color: var(--secondary-text);
            margin-top: 0;
            font-size: 1.1rem;
        }

        #container {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            border-left: 5px solid var(--accent-color);
            transition: transform 0.2s ease;
        }

        .card:hover {
            transform: translateY(-2px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .ruote-titolo {
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
        }

        .badge {
            background-color: #333;
            color: var(--accent-color);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            border: 1px solid var(--accent-color);
        }

        .badge.nuova {
            background-color: var(--accent-color);
            color: #000;
        }

        .numeri-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }

        .cerchio-numero {
            background: radial-gradient(circle at 30% 30%, #333, #1a1a1a);
            color: #fff;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: inset 0 2px 4px rgba(255,255,255,0.1), 0 4px 6px rgba(0,0,0,0.4);
            border: 1px solid #444;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            color: var(--secondary-text);
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .error-message, .no-data {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4px 20px;
            background-color: #2a1a1a;
            border: 1px solid #cc3333;
            color: #ff6666;
            border-radius: 8px;
            font-size: 1.1rem;
        }
        
        .no-data {
            background-color: #1a242f;
            border-color: #2980b9;
            color: #3498db;
        }

        .loading {
            grid-column: 1 / -1;
            text-align: center;
            font-size: 1.2rem;
            color: var(--secondary-text);
            padding: 40px;
        }
    </style>
</head>
<body>

    <header>
        <h1>LOTTO ELITE PRO V4</h1>
        <p class="subtitle">Motore di Ricerca Spaziale - Logica Geometric Mirror</p>
    </header>

    <main id="container">
        <div class="loading">Caricamento delle ultime previsioni in corso...</div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById("container");

            // ATTENZIONE CRUCIALE: Punta a risultati_v4.json per combaciare con Python e Git!
            fetch('risultati_v4.json?t=' + new Date().getTime()) 
                .then(response => {
                    if (!response.ok) {
                        throw new Error("Impossibile caricare il file dei risultati.");
                    }
                    return response.json();
                })
                .then(data => {
                    container.innerHTML = ""; // Svuota il caricamento

                    if (!data || data.length === 0) {
                        container.innerHTML = `<div class="no-data">Nessuna previsione geometrica attiva rilevata nelle ultime estrazioni. Il database è aggiornato ma non ci sono distanze 30 o 45 isotope attive.</div>`;
                        return;
                    }

                    // Ciclo per creare le card sul sito
                    data.forEach(item => {
                        const card = document.createElement("div");
                        card.className = "card";

                        // Determina lo stile del badge (Nuova o Colpo di memoria)
                        const isNuova = item.tag === "NUOVA" || item.colpo === 1;
                        const badgeClass = isNuova ? "badge nuova" : "badge";
                        const badgeTesto = item.tag ? item.tag : `Colpo ${item.colpo}`;

                        card.innerHTML = `
                            <div class="card-header">
                                <span class="ruote-titolo">${item.ruota} - ${item.partner}</span>
                                <span class="${badgeClass}">${badgeTesto}</span>
                            </div>
                            <div class="numeri-container">
                                <div class="cerchio-numero">${item.numeri[0]}</div>
                                <div class="cerchio-numero">${item.numeri[1]}</div>
                            </div>
                            <div class="card-footer">
                                <span>Indice Ciclo: Dist. ${item.score === 180 ? '45' : '30'}</span>
                                <span>Accuratezza: ${item.score}%</span>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                })
                .catch(error => {
                    console.error(error);
                    container.innerHTML = `
                        <div class="error-message">
                            <strong>Attenzione:</strong> Errore nel caricamento dei dati del sito.<br>
                            Assicurati che il file 'risultati_v4.json' esista sul repository e che l'Action di GitHub sia completata con successo.
                        </div>
                    `;
                });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Quant Elite V5</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-orange: #f97316;
            --accent-blue: #38bdf8;
            --accent-cyan: #00e5ff;
            --ruota-yellow: #eab308;
            --ruota-red: #ef4444;
            --ruota-gray: #64748b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px 10px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Header Style */
        .header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }

        .header h1 {
            color: var(--accent-cyan);
            font-size: 1.8rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.95rem;
            font-style: italic;
        }

        /* Navigazione Tab */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .tab-btn {
            background-color: #334155;
            color: var(--text-muted);
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .tab-btn.active {
            background-color: var(--accent-orange);
            color: white;
            box-shadow: 0 4px 14px rgba(249, 115, 22, 0.4);
        }

        /* Grid delle schede */
        .grid-previsioni {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 768px) {
            .grid-previsioni {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (min-width: 1024px) {
            .grid-previsioni {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        /* Card Previsione */
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            border: 1px solid #334155;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .badge-stato {
            position: absolute;
            top: 12px;
            right: 12px;
            background-color: var(--accent-orange);
            color: white;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 4px 8px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        /* Ruote */
        .coppia-ruote {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 20px 0 15px 0;
        }

        .ruota {
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 0.85rem;
            text-transform: uppercase;
            color: white;
        }

        .ruota.yellow { background-color: var(--ruota-yellow); color: #0f172a; }
        .ruota.red { background-color: var(--ruota-red); }
        .ruota.gray { background-color: var(--ruota-gray); }

        .separatore {
            color: var(--text-muted);
            font-weight: 700;
        }

        /* Numeri */
        .coppia-numeri {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .cerchio-numero {
            width: 55px;
            height: 55px;
            border: 2px solid #22c55e;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 700;
            color: #22c55e;
            background-color: rgba(34, 197, 94, 0.05);
        }

        /* Footer Card */
        .card-footer {
            border-top: 1px solid #334155;
            padding-top: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.8rem;
        }

        .budget-box {
            border: 1px solid var(--accent-blue);
            color: var(--accent-blue);
            padding: 4px 8px;
            border-radius: 4px;
            font-weight: 700;
        }

        .rating-box {
            text-align: right;
        }

        .rating-label {
            color: var(--text-muted);
            display: block;
            font-size: 0.7rem;
        }

        .rating-valore {
            color: var(--accent-orange);
            font-weight: 700;
            font-size: 0.95rem;
        }

        /* Loading & Error */
        .status-msg {
            text-align: center;
            color: var(--text-muted);
            grid-column: 1 / -1;
            padding: 4px 0;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="header">
            <h1>📊 LOTTO QUANT ELITE V5</h1>
            <p>Modello Predittivo Multi-Fattoriale • Analisi Statistica Dinamica</p>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="cambiaTab('nuove', this)">Nuove</button>
            <button class="tab-btn" onclick="cambiaTab('colpo2', this)">Colpo 2</button>
        </div>

        <main class="grid-previsioni" id="previsioni-container">
            <div class="status-msg">Elaborazione metriche di calcolo in corso...</div>
        </main>
    </div>

    <script>
        let datiPrevisioni = null;
        let tabCorrente = 'nuove';

        // Caricamento asincrono del file JSON generato dalle Github Actions
        async function caricaDati() {
            const container = document.getElementById('previsioni-container');
            try {
                // Aggiungiamo un timestamp per bypassare la cache di GitHub Pages
                const response = await fetch('risultati_v4.json?t=' + new Date().getTime());
                if (!response.ok) throw new Error('Impossibile leggere il file dei dati');
                
                datiPrevisioni = await response.json();
                renderPrevisioni();
            } catch (error) {
                console.error(error);
                container.innerHTML = `<div class="status-msg" style="color: #ef4444;">⚠️ Errore nel caricamento del flusso dati: aggiornare l'archivio.</div>`;
            }
        }

        function renderPrevisioni() {
            const container = document.getElementById('previsioni-container');
            container.innerHTML = '';

            if (!datiPrevisioni || !datiPrevisioni[tabCorrente] || datiPrevisioni[tabCorrente].length === 0) {
                container.innerHTML = `<div class="status-msg">Nessuna previsione statistica attiva per questa categoria.</div>`;
                return;
            }

            datiPrevisioni[tabCorrente].forEach(prev => {
                const card = document.createElement('div');
                card.className = 'card';

                // Determina il testo del badge di stato basato sul tab corrente
                const testoBadge = tabCorrente === 'nuove' ? 'Nuova' : 'Colpo 2';

                card.innerHTML = `
                    <div class="badge-stato">${testoBadge}</div>
                    
                    <div class="coppia-ruote">
                        <span class="ruota ${prev.colore_r1}">${prev.ruota1}</span>
                        <span class="separatore">•</span>
                        <span class="ruota ${prev.colore_r2}">${prev.ruota2}</span>
                    </div>

                    <div class="coppia-numeri">
                        <div class="cerchio-numero">${prev.numero1}</div>
                        <div class="cerchio-numero">${prev.numero2}</div>
                    </div>

                    <div class="card-footer">
                        <div class="budget-box">BUDGET: ${prev.budget}</div>
                        <div class="rating-box">
                            <span class="rating-label">Rating Algoritmo</span>
                            <span class="rating-valore">${prev.accuratezza}</span>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function cambiaTab(tab, elemento) {
            tabCorrente = tab;
            
            // Aggiorna lo stato grafico dei pulsanti tab
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            elemento.classList.add('active');
            
            renderPrevisioni();
        }

        // Inizializzazione al caricamento della pagina
        window.onload = caricaDati;
    </script>
</body>
</html>

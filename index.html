<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOTTO ELITE PRO V5 - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121824;
            --card-bg: #1e2530;
            --accent-orange: #ff6b35;
            --text-color: #ffffff;
            --text-muted: #a0aec0;
            --circle-green: #2ecc71;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 28px;
            font-weight: 800;
            letter-spacing: 1px;
            margin: 10px 0;
        }

        .subtitle {
            color: var(--accent-orange);
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
        }

        /* --- STILE PASSO 3: MAPPA DEL CALORE --- */
        .heat-map-container {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .heat-map-container h3 {
            margin-top: 0;
            margin-bottom: 15px;
            font-size: 16px;
            color: var(--accent-orange);
            text-transform: uppercase;
            text-align: center;
        }

        .heat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(90px, 1fr));
            gap: 10px;
        }

        .heat-box {
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            border-bottom: 4px solid #333;
            transition: all 0.3s ease;
        }

        .heat-box .ruota-nome {
            font-size: 12px;
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }

        .heat-box .percentage {
            font-size: 16px;
            font-weight: 800;
        }

        /* --- TABS --- */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .tab-btn {
            background: rgba(255,255,255,0.05);
            border: none;
            color: var(--text-muted);
            padding: 10px 25px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: var(--accent-orange);
            color: white;
            box-shadow: 0 4px 10px rgba(255, 107, 53, 0.4);
        }

        /* --- GRID DELLE CARD --- */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.03);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            padding-bottom: 10px;
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
        }

        .badge-colpo {
            background: var(--accent-orange);
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 4px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .numbers-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0;
        }

        .num-circle {
            width: 55px;
            height: 55px;
            border: 2px solid var(--circle-green);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 800;
            color: var(--text-color);
        }

        .details-row {
            font-size: 11px;
            color: var(--text-muted);
            margin: 5px 0;
            line-height: 1.4;
        }

        .accuracy-row {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.05);
            padding-top: 10px;
        }

        /* --- STILE PASSO 2: BADGE NOTA LATERALE --- */
        .nota-laterale {
            background: rgba(255, 107, 53, 0.15);
            border-left: 3px solid var(--accent-orange);
            color: #ff9f43;
            font-size: 11px;
            padding: 6px 10px;
            border-radius: 4px;
            margin-top: 12px;
            font-weight: 600;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <div class="subtitle">Geometric Mirror • Analisi Simmetrie Isotope</div>
        <h1>💎 LOTTO ELITE PRO V5 💎</h1>
    </header>

    <div class="heat-map-container">
        <h3>🔥 Mappa del Calore Ruote (Tensione Ciclometrica)</h3>
        <div class="heat-grid" id="heatGrid">
            </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="cambiaTab('nuove')">Nuove</button>
        <button class="tab-btn" onclick="cambiaTab('colpo2')">Colpo 2</button>
        <button class="tab-btn" onclick="cambiaTab('colpo3')">Colpo 3</button>
    </div>

    <div class="cards-grid" id="cardsContainer">
        </div>

    <script>
        let datiGlobali = null;
        let tabCorrente = 'nuove';

        function getHeatColor(percentage) {
            // 0% -> Verde scuro/grigio, 100% -> Rosso fuoco

            const g = Math.floor((percentage / 100) * 76 + (1 - percentage / 100) * 204);
            const b = Math.floor((percentage / 100) * 60 + (1 - percentage / 100) * 113);

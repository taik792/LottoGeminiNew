<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Elite Pro - Geometric Mirror V4</title>
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --text-color: #ffffff;
            --accent-color: #ff9800;
            --secondary-text: #b0b0b0;
            --shadow: 0 4px 6px rgba(0,0,0,0.3);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            width: 100%;
            max-width: 800px;
        }

        h1 {
            color: var(--accent-color);
            margin-bottom: 5px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .subtitle {
            color: var(--secondary-text);
            margin-top: 0;
            font-size: 1.1rem;
        }

        #container {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow);
            border-left: 5px solid var(--accent-color);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .ruote-titolo {
            font-size: 1.3rem;
            font-weight: bold;
            color: #fff;
        }

        .badge {
            background-color: #333;
            color: var(--accent-color);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            border: 1px solid var(--accent-color);
        }

        .numeri-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 15px 0;
        }

        .cerchio-numero {
            background: radial-gradient(circle at 30% 30%, #444, #1a1a1a);
            color: var(--accent-color);
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.4);
            border: 1px solid var(--accent-color);
        }

        /* STILE PER LA VISUALIZZAZIONE DELLE CINQUE ESTRAZIONI REALI */
        .storico-estrazioni {
            background-color: #151515;
            border-radius: 6px;
            padding: 10px;
            margin-top: 15px;
            font-size: 0.85rem;
            border: 1px solid #252525;
        }

        .riga-estrazione {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
            color: var(--secondary-text);
        }

        .riga-estrazione:last-child {
            margin-bottom: 0;
        }

        .valori-estrazione {
            color: #fff;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            color: var(--secondary-text);
            font-size: 0.85rem;
            margin-top: 15px;
            border-top: 1px solid #2a2a2a;
            padding-top: 8px;
        }

        .loading, .no-data {
            grid-column: 1 / -1;
            text-align: center;
            padding: 30px;
            color: var(--secondary-text);
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>LOTTO ELITE PRO V4</h1>
        <p class="subtitle">Motore di Ricerca Spaziale - Logica Geometric Mirror</p>
    </header>

    <main id="container">
        <div class="loading">Caricamento in corso...</div>
    </main>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById("container");

            fetch('risultati_v4.json?t=' + new Date().getTime()) 
                .then(response => response.json())
                .then(data => {
                    container.innerHTML = ""; 

                    if (!data || data.length === 0) {
                        container.innerHTML = `<div class="no-data">Nessun pronostico generato. Inserisci l'ID numerico corretto del concorso nel JSON.</div>`;
                        return;
                    }

                    data.forEach(item => {
                        const card = document.createElement("div");
                        card.className = "card";

                        // Estrae le stringhe dei 5 numeri reali separati dal punto
                        const stringa_r1 = item.estrazione_r1 ? item.estrazione_r1.join('.') : '-';
                        const stringa_r2 = item.estrazione_r2 ? item.estrazione_r2.join('.') : '-';

                        card.innerHTML = `
                            <div class="card-header">
                                <span class="ruote-titolo">${item.ruota} - ${item.partner}</span>
                                <span class="badge">${item.tag}</span>
                            </div>
                            <div class="numeri-container">
                                <div class="cerchio-numero">${item.numeri[0]}</div>
                                <div class="cerchio-numero">${item.numeri[1]}</div>
                            </div>
                            <div class="storico-estrazioni">
                                <div class="riga-estrazione">
                                    <span>${item.ruota}:</span>
                                    <span class="valori-estrazione">${stringa_r1}</span>
                                </div>
                                <div class="riga-estrazione">
                                    <span>${item.partner}:</span>
                                    <span class="valori-estrazione">${stringa_r2}</span>
                                </div>
                            </div>
                            <div class="card-footer">
                                <span>Ciclo: Dist. ${item.score === 180 ? '45' : '30'}</span>
                                <span>Accuratezza: ${item.score}%</span>
                            </div>
                        `;
                        container.appendChild(card);
                    });
                })
                .catch(error => {
                    container.innerHTML = `<div class="no-data">Errore di caricamento dati.</div>`;
                });
        });
    </script>
</body>
</html>

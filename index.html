<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Elite Pro V4 - Cyclo Edition</title>
    <style>
        :root {
            --bg-color: #0f0f0f;
            --card-bg: linear-gradient(145deg, #1a1a1a, #252525);
            --accent-gold: #ffcc00;
            --accent-cyan: #00d4ff;
            --accent-red: #ff3366;
            --palla-verde: #28a745;
        }

        body { 
            background-color: var(--bg-color); 
            color: #e0e0e0; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 20px;
            text-align: center;
        }

        h1 { color: #ffffff; text-shadow: 0 0 15px var(--accent-gold); margin-bottom: 5px; }
        .subtitle { color: #00ffcc; font-size: 0.9em; margin-bottom: 30px; letter-spacing: 1px; }

        /* --- SEZIONE TOP 3 --- */
        .top-header { margin-bottom: 10px; color: var(--accent-gold); font-weight: bold; font-size: 1.1em; }
        .top-container {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }
        .top-card {
            background: rgba(255, 204, 0, 0.05);
            border: 2px solid var(--accent-gold);
            border-radius: 12px;
            padding: 15px;
            min-width: 220px;
            box-shadow: 0 0 15px rgba(255, 204, 0, 0.1);
        }
        .top-rank { color: var(--accent-gold); font-size: 0.8em; font-weight: bold; text-transform: uppercase; }
        .top-ambo { font-size: 1.4em; font-weight: bold; margin: 5px 0; color: #fff; }

        /* --- GRIGLIA RUOTE --- */
        .container { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 25px; 
            max-width: 1300px; 
            margin: auto; 
        }

        .card { 
            background: var(--card-bg); 
            border: 1px solid #333; 
            border-radius: 15px; 
            padding: 20px; 
            position: relative;
            box-shadow: 5px 5px 15px rgba(0,0,0,0.5); 
            transition: transform 0.2s, border-color 0.2s; 
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent-gold); }

        .score-tag { 
            position: absolute; 
            top: 15px; 
            right: 15px; 
            background: var(--accent-gold); 
            color: #000; 
            padding: 2px 8px; 
            border-radius: 4px; 
            font-weight: bold; 
            font-size: 0.8em; 
        }

        .ruota-nome { font-size: 1.5em; font-weight: bold; color: var(--accent-cyan); margin-bottom: 15px; text-align: left; }

        .sezione-label { font-size: 0.7em; color: #777; text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }

        .ultima-estrazione { display: flex; gap: 4px; margin-bottom: 20px; }
        .palla-grigia { background: #333; color: #999; border-radius: 50%; width: 30px; height: 30px; line-height: 30px; font-size: 0.8em; font-weight: bold; }

        .previsione { margin-bottom: 15px; }
        .palla-ambo { 
            display: inline-block; 
            background: var(--palla-verde); 
            color: white; 
            border-radius: 50%; 
            width: 55px; 
            height: 55px; 
            line-height: 55px; 
            margin: 5px; 
            font-size: 1.6em; 
            font-weight: bold; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .diametrali-box {
            background: rgba(255, 51, 102, 0.1);
            border-radius: 8px;
            padding: 8px;
            color: var(--accent-red);
            font-weight: bold;
            font-size: 0.9em;
        }

        .footer-card { margin-top: 15px; font-size: 0.75em; color: #666; }
    </style>
</head>
<body>

    <h1>🔥 LOTTO ELITE PRO V4 🔥</h1>
    <div class="subtitle">CYCLO EDITION - ANALISI DISTANZA 45</div>

    <div class="top-header">🏆 TOP 3 RUOTE DEL MOMENTO 🏆</div>
    <div id="top-container" class="top-container">
        </div>

    <div class="container" id="container-ruote">
        </div>

    <script>
        async function caricaDati() {
            try {
                const response = await fetch('risultati_v4.json?t=' + Date.now());
                const data = await response.json();
                
                // Gestione struttura: cerca 'ruote' o usa il file intero
                const risultati = data.ruote ? data.ruote : data;
                
                const container = document.getElementById('container-ruote');
                const topContainer = document.getElementById('top-container');
                
                container.innerHTML = '';
                topContainer.innerHTML = '';

                // 1. Logica Top 3
                const ruoteOrdinate = Object.keys(risultati).sort((a, b) => risultati[b].score - risultati[a].score);
                
                ruoteOrdinate.slice(0, 3).forEach((ruota, index) => {
                    const info = risultati[ruota];
                    topContainer.innerHTML += `
                        <div class="top-card">
                            <div class="top-rank">#${index + 1} ${ruota}</div>
                            <div class="top-ambo">${info.ambo[0]} - ${info.ambo[1]}</div>
                            <div style="font-size: 0.7em; color: #aaa;">SCORE: ${info.score}</div>
                        </div>
                    `;
                });

                // 2. Griglia completa
                Object.keys(risultati).forEach(ruota => {
                    const info = risultati[ruota];
                    
                    // Gestione fallback per chiavi diverse (diametrali/vertibili)
                    const d45 = info.diametrali ? info.diametrali.join(' - ') : (info.vertibili ? info.vertibili.join(' - ') : 'N/D');
                    const ultimaEstrazioneHtml = info.ultima ? info.ultima.map(n => `<div class="palla-grigia">${n}</div>`).join('') : 'Dato non disponibile';

                    container.innerHTML += `
                        <div class="card">
                            <div class="score-tag">SCORE: ${Math.round(info.score)}</div>
                            <div class="ruota-nome">${ruota}</div>
                            
                            <div class="sezione-label">Ultima Estrazione</div>
                            <div class="ultima-estrazione">${ultimaEstrazioneHtml}</div>
                            
                            <div class="sezione-label">Previsione Ciclometrica</div>
                            <div class="previsione">
                                <div class="palla-ambo">${info.ambo[0]}</div>
                                <div class="palla-ambo">${info.ambo[1]}</div>
                            </div>
                            
                            <div class="diametrali-box">
                                DIAMETRALI D45: ${d45}
                            </div>
                            
                            <div class="footer-card">
                                Ciclo: ${info.countdown || 5} estr. rimanenti
                            </div>
                        </div>
                    `;
                });

            } catch (error) {
                console.error("Errore nel caricamento:", error);
                document.getElementById('container-ruote').innerHTML = "<p style='color:red;'>Errore nel caricamento dei risultati_v4.json</p>";
            }
        }

        window.onload = caricaDati;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Elite Pro V5 - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-principal: #121824;
            --bg-card: #1c2434;
            --accento: #ff6b35;
            --accento-hover: #e0531f;
            --testo: #ffffff;
            --testo-mutato: #a0aec0;
            --basso: #2d3748;
            --medio: #d69e2e;
            --alto: #e53e3e;
            --diamante: #00b4d8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--testo);
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(145deg, #161f30, #1c273c);
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        header h1 {
            font-size: 2.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
            color: var(--testo);
        }

        header h1 i {
            color: var(--diamante);
            margin: 0 10px;
        }

        .sottotitolo {
            color: var(--accento);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .sezione-heatmap {
            background-color: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .sezione-heatmap h2 {
            font-size: 1.2rem;
            color: var(--accento);
            text-transform: uppercase;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .grid-heatmap {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 10px;
        }

        .cella-ruota {
            padding: 12px;
            text-align: center;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.95rem;
            text-transform: uppercase;
            transition: transform 0.2s;
        }

        .cella-ruota:hover {
            transform: translateY(-2px);
        }

        .calore-basso { background-color: var(--basso); color: var(--testo-mutato); }
        .calore-medio { background-color: var(--medio); color: #000; }
        .calore-alto { background-color: var(--alto); color: var(--testo); animation: pulse 2s infinite; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(229, 62, 62, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(229, 62, 62, 0); }
            100% { box-shadow: 0 0 0 0 rgba(229, 62, 62, 0); }
        }

        .nav-colpi {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn-colpo {
            background-color: #242f48;
            color: var(--testo);
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .btn-colpo:hover {
            background-color: #2d3b5a;
        }

        .btn-colpo.attivo {
            background-color: var(--accento);
            box-shadow: 0 0 15px rgba(255, 107, 53, 0.4);
        }

        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 20px;
        }

        .card-previsione {
            background-color: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            position: relative;
            border: 1px solid rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .badge-colpo {
            position: absolute;
            top: 15px;
            right: 15px;
            background-color: var(--accento);
            color: white;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .ruote-titolo {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--testo);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 8px;
        }

        .cerchi-numeri {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 15px 0;
        }

        .cerchio {
            width: 55px;
            height: 55px;
            border: 3px solid #2dcd73;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: bold;
            color: #2dcd73;
            background-color: rgba(45, 205, 115, 0.1);
        }

        .info-storiche {
            margin-top: 15px;
            font-size: 0.85rem;
            color: var(--testo-mutato);
            background-color: rgba(0,0,0,0.2);
            padding: 10px;
            border-radius: 6px;
        }

        .riga-storica {
            display: flex;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .riga-storica:last-child {
            margin-bottom: 0;
        }

        .score-box {
            margin-top: 12px;
            font-size: 0.8rem;
            font-weight: bold;
            color: var(--diamante);
            text-align: right;
        }

        .nessun-dato {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px;
            color: var(--testo-mutato);
            font-style: italic;
        }
    </style>
</head>
<body>

    <header>
        <div class="sottotitolo">Geometric Mirror • Analisi Simmetrie Isotope</div>
        <h1><i class="fas fa-gem"></i> Lotto Elite Pro V5 <i class="fas fa-gem"></i></h1>
    </header>

    <div class="sezione-heatmap">
        <h2><i class="fas fa-fire"></i> Mappa del Calore Ruote (Tensione Ciclometrica)</h2>
        <div class="grid-heatmap" id="container-heatmap">
            </div>
    </div>

    <div class="nav-colpi">
        <button class="btn-colpo attivo" onclick="cambiaTab('nuove')">Nuove</button>
        <button class="btn-colpo" onclick="cambiaTab('colpo2')">Colpo 2</button>
        <button class="btn-colpo" onclick="cambiaTab('colpo3')">Colpo 3</button>
    </div>

    <div class="grid-cards" id="container-cards">
        </div>

    <script>
        let datiGlobali = null;
        let tabCorrente = 'nuove';

        // Caricamento asincrono dei dati JSON
        async function caricaDati() {
            try {
                // Previene la cache del browser forzando l'aggiornamento reale del file
                const risposta = await fetch('risultati_v4.json?t=' + new Date().getTime());
                datiGlobali = await risposta.json();
                
                renderHeatmap(datiGlobali.mappa_colore);
                renderCards(tabCorrente);
            } catch (errore) {
                console.error("Errore nel caricamento del file risultati_v4.json:", errore);
                document.getElementById('container-cards').innerHTML = 
                    `<div class="nessun-dato">Errore nel caricamento dei dati. Verifica che il file risultati_v4.json sia generato correttamente.</div>`;
            }
        }

        // Funzione per renderizzare la Heatmap
        function renderHeatmap(mappaCalore) {
            const container = document.getElementById('container-heatmap');
            container.innerHTML = '';
            
            if (!mappaCalore || Object.keys(mappaCalore).length === 0) {
                container.innerHTML = '<div style="color: var(--testo-mutato)">Nessun dato di tensione disponibile.</div>';
                return;
            }

            for (const [ruota, classeCalore] of Object.entries(mappaCalore)) {
                const cella = document.createElement('div');
                cella.className = `cella-ruota ${classeCalore}`;
                cella.innerText = ruota;
                container.appendChild(cella);
            }
        }

        // Funzione per renderizzare le Cards del Colpo selezionato
        function renderCards(colpo) {
            const container = document.getElementById('container-cards');
            container.innerHTML = '';

            if (!datiGlobali || !datiGlobali[colpo] || datiGlobali[colpo].length === 0) {
                container.innerHTML = `<div class="nessun-dato">Nessuna previsione ottimale trovata per la sezione attuale.</div>`;
                return;
            }

            datiGlobali[colpo].forEach(item => {
                const card = document.createElement('div');
                card.className = 'card-previsione';
                
                // Formatta l'etichetta visiva del colpo
                let etichettaBadge = colpo === 'nuove' ? 'Nuova' : colpo === 'colpo2' ? 'Colpo 2' : 'Colpo 3';

                card.innerHTML = `
                    <span class="badge-colpo">${etichettaBadge}</span>
                    <div>
                        <div class="ruote-titolo">${item.ruota1} - ${item.ruota2}</div>
                        <div class="cerchi-numeri">
                            <div class="cerchio">${item.num1}</div>
                            <div class="cerchio">${item.num2}</div>
                        </div>
                    </div>
                    <div>
                        <div class="info-storiche">
                            <div class="riga-storica"><span>${item.ruota1}:</span> <span>${item.dati_r1}</span></div>
                            <div class="riga-storica"><span>${item.ruota2}:</span> <span>${item.dati_r2}</span></div>
                        </div>
                        <div class="score-box">Accuratezza: ${item.score}% • Ciclo Attivo</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Funzione per gestire lo switch dei tab dei colpi
        function cambiaTab(nomeTab) {
            tabCorrente = nomeTab;
            
            // Gestione classi attive sui bottoni
            const bottoni = document.querySelectorAll('.btn-colpo');
            bottoni.forEach(btn => {
                if(btn.innerText.toLowerCase() === nomeTab.replace('colpo', 'colpo ')) {
                    btn.classList.add('attivo');
                } else if (nomeTab === 'nuove' && btn.innerText.toLowerCase() === 'nuove') {
                    btn.classList.add('attivo');
                } else {
                    btn.classList.remove('attivo');
                }
            });

            renderCards(tabCorrente);
        }

        // Avvio al caricamento della pagina
        window.onload = caricaDati;
    </script>
</body>
</html>

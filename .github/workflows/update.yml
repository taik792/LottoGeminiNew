name: Lotto Elite Pro V5 - Elaborazione Automatica

on:
  push:
    paths:
      - 'estrazioni.json'
      - 'genera_risultati.py'
  workflow_dispatch: # Ti permette di avviare l'algoritmo manualmente dalla scheda Actions

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Configurazione di Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Esegui algoritmo statistico-dinamico
        run: python genera_risultati.py

      - name: Configura Git e salva i risultati
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add risultati_v4.json
          # Esegue il commit solo se il file risultati_v4.json è effettivamente cambiato
          git diff --quiet && git diff --staged --quiet || (git commit -m "Aggiornamento automatico dashboard risultati_v4.json" && git push)
